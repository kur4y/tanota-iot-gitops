---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iot-app
  # must be deployed in 'dev'
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iot-app
  template:
    metadata:
      labels:
        app: iot-app
    spec:
      containers:
      - name: playground
        # initial version set to v1
        image: wil42/playground:v1
        ports:
        - containerPort: 8888

---
apiVersion: v1
kind: Service
metadata:
  name: iot-service
  namespace: dev
spec:
  selector:
    app: iot-app
  type: LoadBalancer
  ports:
  - port: 8888
    targetPort: 8888
